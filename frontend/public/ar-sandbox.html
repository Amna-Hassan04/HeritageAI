<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeritageAI AR Engine Sandbox</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
    }
    /* Lock the injected video stream to fill the browser frame */
    video {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }
    a-scene {
      width: 100vw;
      height: 100vh;
      position: absolute !important;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

<a-scene
        mindar-image="imageTargetSrc: /assets/original-mural.mind; autoStart: true; uiLoading: no; uiScanning: no;"
        embedded
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="mural-target" mindar-image-target="targetIndex: 0"></a-entity>
</a-scene>

<script>
    // Post message back up to the parent React window when target acquired
    document.querySelector('#mural-target').addEventListener('targetFound', () => {
      window.parent.postMessage('MURAL_TARGET_DETECTED', '*');
    });
  </script>
</body>
</html>
